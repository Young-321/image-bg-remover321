name = "bg-remover"
pages_build_output_dir = "./out"
compatibility_date = "2025-03-21"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "bg-remover-users"
database_id = "your-database-id-here" # 部署后替换

# PayPal 环境变量（沙箱环境）
[vars]
PAYPAL_MODE = "sandbox"

# 注意：敏感信息通过 Secrets 设置，不要直接写在这里
# PAYPAL_CLIENT_ID (在 Cloudflare Dashboard 中设置为 Secret)
# PAYPAL_CLIENT_SECRET (在 Cloudflare Dashboard 中设置为 Secret)
# PAYPAL_WEBHOOK_ID (在 Cloudflare Dashboard 中设置为 Secret)
